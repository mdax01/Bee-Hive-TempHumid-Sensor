<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ hive_name }} Log — Hive Environmental Monitor</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <svg class="hex-icon" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
      <polygon points="13,2 39,2 51,26 39,50 13,50 1,26" fill="#1a1f0a" stroke="#f5c518" stroke-width="2.5"/>
      <text x="26" y="33" text-anchor="middle" font-size="22">&#x1F41D;</text>
    </svg>
    <h1>{{ hive_name }} Log</h1>
  </div>
  <a href="/" class="btn btn-secondary">&larr; Dashboard</a>
</header>

<main class="log-page">
  <div class="log-toolbar">
    <button id="addLogBtn" class="icon-btn" title="Add entry">+</button>
    <span class="log-toolbar-label">Add Entry</span>
  </div>
  <div id="logEntries" class="log-entries"></div>
</main>

<div id="logFormModal" class="modal-backdrop hidden">
  <div class="modal-box">
    <h3>New Log Entry</h3>
    <input id="logDateInput" type="datetime-local">
    <input id="logTextInput" type="text" placeholder="e.g. Opened Entrance 2" maxlength="200">
    <div class="modal-actions">
      <button id="logSaveBtn" class="btn">Save</button>
      <button id="logCancelBtn" class="btn btn-secondary">Cancel</button>
    </div>
  </div>
</div>

<script>
const LOG_FOLDER = {{ folder | tojson }};
</script>
<script src="{{ url_for('static', filename='log.js') }}"></script>
</body>
</html>
