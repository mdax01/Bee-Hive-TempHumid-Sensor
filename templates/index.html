<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hive Environmental Monitor</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <svg class="hex-icon" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
      <polygon points="13,2 39,2 51,26 39,50 13,50 1,26" fill="#1a1f0a" stroke="#f5c518" stroke-width="2.5"/>
      <text x="26" y="33" text-anchor="middle" font-size="22">&#x1F41D;</text>
    </svg>
    <h1>Hive Environmental Monitor</h1>
  </div>
  <div class="add-sensor-wrap">
    <span class="add-sensor-label">Add Sensor</span>
    <button id="addSensorBtn" class="icon-btn" title="Add Sensor">+</button>
    <div id="discoverPanel" class="discover-panel hidden">
      <div id="discoverEmpty" class="discover-empty hidden">No new sensors detected nearby.</div>
      <select id="discoverSelect"></select>
      <div class="discover-actions">
        <button id="discoverChoose" class="btn">Select</button>
        <button id="discoverCancel" class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>
</header>

<section class="compare-section hidden">
  <div class="compare-header">
    <h2 class="compare-title">All Hives</h2>
    <button id="compareMetricBtn" class="btn btn-secondary">Humidity</button>
  </div>
  <div class="compare-chart-wrap" id="compareChartWrap">
    <canvas id="compareChart"></canvas>
  </div>
  <div class="range-links">
    <a data-range="week">Weekly</a> · <a data-range="month">Monthly</a> · <a data-range="ytd">Year to Date</a>
  </div>
</section>

<main id="cards" class="cards"></main>

<section class="export-section">
  <div id="exportHeader" class="export-header hidden">
    <h2 class="export-title">Download Data</h2>
    <div class="range-links">
      <a id="exportDay">Day</a> · <a id="exportMonth">Month</a> · <a id="exportYear">Year</a>
    </div>
  </div>
  <div class="footer-links">
    <a href="#" id="logLink" class="info-link">Log</a>
    <a href="/info" class="info-link">Info</a>
  </div>
</section>

<div id="logHiveModal" class="modal-backdrop hidden">
  <div class="modal-box">
    <h3>View Log For</h3>
    <select id="logHiveSelect"></select>
    <div class="modal-actions">
      <button id="logHiveGo" class="btn">Open</button>
      <button id="logHiveCancel" class="btn btn-secondary">Cancel</button>
    </div>
  </div>
</div>

<div id="nameModal" class="modal-backdrop hidden">
  <div class="modal-box">
    <h3>Name this hive</h3>
    <p class="modal-mac" id="nameModalMac"></p>
    <input id="hiveNameInput" type="text" placeholder="e.g. Hive 5" maxlength="40">
    <div class="modal-actions">
      <button id="hiveNameSave" class="btn">Save</button>
      <button id="hiveNameCancel" class="btn btn-secondary">Cancel</button>
    </div>
  </div>
</div>

<div id="overlay" class="overlay hidden">
  <button id="overlayClose" class="overlay-close" title="Close">&times;</button>
  <div class="overlay-header">
    <h2 id="overlayTitle"></h2>
    <button id="overlayMetricBtn" class="btn btn-secondary hidden">Humidity</button>
  </div>
  <div class="overlay-chart-wrap">
    <button id="overlayPrev" class="overlay-nav overlay-nav-left" title="Previous period">&#8249;</button>
    <canvas id="overlayChart"></canvas>
    <button id="overlayNext" class="overlay-nav overlay-nav-right" title="Next period">&#8250;</button>
  </div>
</div>

<script src="{{ url_for('static', filename='chart.umd.min.js') }}"></script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
